<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="page-login" class="page active">
  <div class="auth-left">
    <div class="auth-brand">
      <span class="logo-icon">🌿</span>
      <h1>FreshNest</h1>
      <p>Post-Harvest Storage &amp; Logistics Management for Bangladeshi Farmers</p>
    </div>
    <div class="auth-features">
      <div class="auth-feat"><span class="icon">🚜</span><span>List &amp; manage your produce</span></div>
      <div class="auth-feat"><span class="icon">🚛</span><span>Request transport services</span></div>
      <div class="auth-feat"><span class="icon">🤝</span><span>Connect with dealers directly</span></div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-box">
      <h2>Welcome back</h2>
      <p class="sub">Login to your HarvestLink account</p>
      <div class="alert alert-error" id="login-alert"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Login</button>
      <div class="switch-link">Don't have an account? <a onclick="showPage('register')">Register here</a></div>
    </div>
  </div>
</div>
</body>
</html>
