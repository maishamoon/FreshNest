<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HarvestLink BD</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green:    #1a4a2e;
    --green2:   #2d7a4f;
    --green3:   #4caf78;
    --amber:    #e8a020;
    --cream:    #f9f5ee;
    --white:    #ffffff;
    --text:     #1c2b1e;
    --muted:    #6b7c72;
    --border:   #dde8e0;
    --danger:   #d94040;
    --shadow:   0 4px 24px rgba(26,74,46,.10);
    --shadow2:  0 2px 8px  rgba(26,74,46,.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text); min-height:100vh; }

/* ── PAGES ── */
  .page { display:none; min-height:100vh; }
  .page.active { display:flex; }

</style>
</head>
<body>
<!-- ══════════════════════════════════════════
     PAGE 1: LOGIN
══════════════════════════════════════════ -->
<div id="page-login" class="page active">
  <div class="auth-left">
    <div class="auth-brand">
      <span class="logo-icon">🌿</span>
      <h1>FreshNest</h1>
      <p>Post-Harvest Storage &amp; Logistics Management for Bangladeshi Farmers</p>
    </div>
    <div class="auth-features">
      <div class="auth-feat"><span class="icon">🚜</span><span>List &amp; manage your produce</span></div>
      <div class="auth-feat"><span class="icon">🚛</span><span>Request transport services</span></div>
      <div class="auth-feat"><span class="icon">🤝</span><span>Connect with dealers directly</span></div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-box">
      <h2>Welcome back</h2>
      <p class="sub">Login to your HarvestLink account</p>
      <div class="alert alert-error" id="login-alert"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="Enter your password">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Login</button>
      <div class="switch-link">Don't have an account? <a onclick="showPage('register')">Register here</a></div>
    </div>
  </div>
</div>
</body>
</html
